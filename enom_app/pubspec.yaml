name: enom_app
description: "ENOM - A premium Flutter application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0-323.0.dev

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  shared_preferences: ^2.3.4
  http: ^1.2.0
  http_parser: ^4.0.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/images/enom_logo.jpeg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/enom_logo.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/videos/
    - assets/images/
    - assets/translations/
